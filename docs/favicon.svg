<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Editorial mark matching the landing page: amber accent on off-black.
       Geometry is a stepped "F" built from three horizontal bars — reads
       as the brand initial without becoming literal letterform. -->
  <rect width="64" height="64" rx="12" fill="#0e0e11"/>
  <rect x="16" y="14"  width="34" height="8" fill="#c79552"/>
  <rect x="16" y="14"  width="8"  height="36" fill="#c79552"/>
  <rect x="16" y="28"  width="24" height="8" fill="#c79552"/>
  <circle cx="46" cy="46" r="4" fill="#c79552"/>
</svg>
